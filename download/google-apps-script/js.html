<script>
  // ==================== SECURITY HELPERS ====================
  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#x27;');
  }
  function escapeAttr(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#x27;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // ==================== CONFIG ====================
  const DEPARTMENTS = {
    admin: { name: 'ฝ่ายแอดมิน', icon: '👤', color: 'bg-blue-500' },
    quotation: { name: 'ฝ่ายทำใบเสนอราคา', icon: '📄', color: 'bg-green-500' },
    procurement: { name: 'ฝ่ายจัดซื้อ', icon: '🛒', color: 'bg-orange-500' }
  }

  // Status config - aligned with STATUS_WORKFLOW.ts
  const STATUS_CONFIG = {
    new: { label: 'รับเรื่องใหม่', icon: '📥', color: '#64748b' },
    queue: { label: 'จองคิว / นัดหมาย', icon: '📋', color: '#eab308' },

    checking_parts: ['send_quote', 'cancelled'],

  // Which department handles which status - aligned with STATUS_WORKFLOW.ts

    admin: ['new', 'queue', 'send_quote', 'waiting_response', 'completed', 'cancelled'],

    procurement: ['checking_parts']

  // ==================== THEME ====================
  const LIGHT = {
    pageBg: '#f8fafc',
    headerBg: 'white',
    headerShadow: '0 1px 2px 0 rgba(0,0,0,0.05)',
    cardBg: 'white',
    cardBorder: '#e2e8f0',
    cardShadow: '0 1px 3px rgba(0,0,0,0.06)',
    textPrimary: '#1e293b',
    textSecond: '#64748b',
    textFaint: '#94a3b8',
    inputBg: '#f8fafc',
    inputBorder: '#e2e8f0',
    chipBg: '#f1f5f9',
    chipText: '#475569',
    btnSecBg: '#f1f5f9',
    btnSecText: '#64748b',
    badgeBg: '#dcfce7',
    badgeText: '#15803d',
    stat2Bg: '#fef3c7',
    stat2Border: '#fde68a',
    stat2Text: '#ca8a04',
    stat3Bg: '#f0fdf4',

    textPrimary: '#f1f5f9',
    textSecond: '#94a3b8',
    textFaint: '#475569',
    inputBg: '#0f172a',
    inputBorder: '#334155',
    chipBg: '#334155',
    chipText: '#cbd5e1',
    btnSecBg: '#334155',
    btnSecText: '#94a3b8',
    badgeBg: '#14532d',
    badgeText: '#86efac',
    stat2Bg: '#1c1709',
    stat2Border: '#713f12',
    stat2Text: '#fbbf24',
    stat3Bg: '#0a1a0a',
    stat3Border: '#14532d',
    stat3Text: '#4ade80',
    sheetOverlay: 'rgba(0,0,0,0.75)',
    sheetBg: '#1e293b',
    descBg: '#0f172a',

    modalOverlay: 'rgba(0,0,0,0.75)',
    labelText: '#cbd5e1',
  }

  function getTheme() { return state.darkMode ? DARK : LIGHT; }

  // ==================== STATE ====================
  let voiceRecognition = null;

  let state = {
    user: null,
    users: [],
    requests: [],
    isLoading: true,
    isSaving: false,
    isModalOpen: false,
    editingRequest: null,
    searchTerm: '',
    statusFilter: 'all',
    currentPage: 1,
    expandedCards: {},
    darkMode: false,
    bottomSheet: null,
    smartPasteTab: 'text',
    aiAnalyzing: false,
    voiceRecording: false,
    voiceTranscript: '',
    aiImageBase64: null,
    formData: {
      channel: 'LINE',
      customerName: '',
      phone: '',
      address: '',
      serviceType: 'ล้างแอร์',
      description: '',
      priority: 'normal',
      status: 'new',
      appointmentDate: '',
      notes: '',
      imageUrl: ''
    }
  }

  // ==================== GOOGLE APPS SCRIPT FUNCTIONS ====================
  function googleScriptRun(func, ...args) {
    console.log('Calling Google Script:', func, args);
    return new Promise((resolve, reject) => {
      try {
        if (!google || !google.script) {
          throw new Error('Google Apps Script not loaded');
        }
        console.log('google.script.run available, calling:', func);
        google.script.run
          .withSuccessHandler(function (result) {
            console.log('Success:', func, result);
            resolve(result);
          })
          .withFailureHandler(function (error) {
            console.error('Google Script Error:', func, error);
            reject(error);
          })
        [func](...args);
      } catch (e) {
        console.error('googleScriptRun error:', e);
        reject(e);
      }
    });
  }

  // ==================== DATA FUNCTIONS ====================
  async function loadData() {
    state.isLoading = true
    render()

    try {
      console.log('Loading data...');
      const [users, requests] = await Promise.all([
        googleScriptRun('getUsers'),
        googleScriptRun('getRequests')
      ])
      state.users = Array.isArray(users) ? users : []
      state.requests = Array.isArray(requests) ? requests : []
    } catch (error) {
      console.error('Load error:', error)
      alert('โหลดข้อมูลไม่สำเร็จ: ' + error.message)
    }

    state.isLoading = false
    render()
  }

  async function saveRequest() {
    if (!state.formData.customerName || !state.formData.phone) {
      alert('กรุณากรอกชื่อลูกค้าและเบอร์โทร')
      return
    }

    state.isSaving = true
    render()

    try {
      const data = { ...state.formData }
      let result
      if (state.editingRequest) {
        result = await googleScriptRun('updateRequest', state.editingRequest.id, data)
      } else {
        result = await googleScriptRun('createRequest', data)
      }

      if (result && result.success) {
        state.isModalOpen = false
        state.editingRequest = null
        await loadData()
      } else {
        alert('บันทึกไม่สำเร็จ: ' + (result ? result.error : 'Unknown error'))
      }
    } catch (error) {
      console.error('Save error:', error)
      alert('บันทึกไม่สำเร็จ: ' + error.message)
    } finally {
      state.isSaving = false
      render()
    }
  }

  async function updateStatus(id, newStatus) {
    try {
      const result = await googleScriptRun('updateStatus', id, newStatus)
      if (result && result.success) {
        state.bottomSheet = null
        await loadData()
      } else {
        alert('อัปเดตสถานะไม่สำเร็จ: ' + (result ? result.error : 'Unknown error'))
      }
    } catch (error) {
      console.error('Update status error:', error)
      alert('อัปเดตสถานะไม่สำเร็จ: ' + error.message)
    }
  }

  async function deleteRequest(id) {
    if (!confirm('ยืนยันการลบงานนี้?')) return
    try {
      const result = await googleScriptRun('deleteRequest', id)
      if (result && result.success) {
        state.bottomSheet = null
        await loadData()
      } else {
        alert('ลบไม่สำเร็จ: ' + (result ? result.error : 'Unknown error'))
      }
    } catch (error) {
      console.error('Delete error:', error)
      alert('ลบไม่สำเร็จ: ' + error.message)
    }
  }

  async function handleFileUpload(event) {
    const file = event.target.files[0]
    if (!file) return

    const reader = new FileReader()
    reader.onload = async function (e) {
      try {
        const base64 = e.target.result
        const result = await googleScriptRun('uploadImage', base64, file.name)
        if (result && result.success) {
          state.formData.imageUrl = result.url
          render()
        } else {
          alert('อัปโหลดรูปไม่สำเร็จ: ' + (result ? result.error : 'Unknown error'))
        }
      } catch (error) {
        console.error('Upload error:', error)
        alert('อัปโหลดรูปไม่สำเร็จ: ' + error.message)
      }
    }
    reader.readAsDataURL(file)
  }

  // ==================== SMART PASTE ====================
  window.processSmartPaste = function () {
    const input = document.getElementById('smartPasteInput')
    if (!input || !input.value.trim()) { alert('กรุณาใส่ข้อความก่อน'); return; }
    const text = input.value.trim()

    const phoneMatch = text.match(/0[6-9]\d{8}/)
    if (phoneMatch) state.formData.phone = phoneMatch[0]

    const nameMatch = text.match(/(?:คุณ|นาย|นาง|นางสาว|ร้าน|บริษัท)?\s*([^\s\d,]+(?:\s+[^\s\d,]+)?)/u)
    if (nameMatch) state.formData.customerName = nameMatch[0].trim()

    if (/ด่วนมาก|ฉุกเฉิน|urgency|emergency/i.test(text)) state.formData.priority = 'emergency'
    else if (/ด่วน|urgent/i.test(text)) state.formData.priority = 'urgent'

    if (/ล้างแอร์|ล้าง/i.test(text)) state.formData.serviceType = 'ล้างแอร์'
    else if (/ซ่อม/i.test(text)) state.formData.serviceType = 'ซ่อม'
    else if (/ติดตั้ง/i.test(text)) state.formData.serviceType = 'ติดตั้ง'
    else if (/ตรวจ/i.test(text)) state.formData.serviceType = 'ตรวจสอบ'

    state.formData.description = text
    render()
  }

  // ==================== WINDOW FUNCTIONS ====================
  window.loginById = function (id) {
    if (!state.users) {
      alert('Users data not loaded yet');
      return;
    }
    const user = state.users.find(u => String(u.id) === String(id));
    if (user) {
      state.user = user;
      loadData();
    } else {
      alert('User not found: ' + id);
    }
  }

  window.logout = function () {
    state.user = null;
    state.requests = [];
    render();
  }

  window.openModal = function (request) {
    state.bottomSheet = null;
    state.editingRequest = request || null;
    state.formData = request ? { ...request } : {
      channel: 'LINE',
      customerName: '',
      phone: '',
      address: '',
      serviceType: 'ล้างแอร์',
      description: '',
      priority: 'normal',
      status: 'new',
      appointmentDate: '',
      notes: '',
      imageUrl: ''
    };
    state.isModalOpen = true;
    render();
  }

  window.openModalById = function (id) {
    const request = state.requests.find(r => String(r.id) === String(id));
    if (request) {
      window.openModal(request);
    } else {
      alert('Request not found: ' + id);
    }
  }

  window.closeModal = function () {
    state.isModalOpen = false;
    state.editingRequest = null;
    render();
  }

  window.loadData = loadData;
  window.saveRequest = saveRequest;
  window.updateStatus = updateStatus;
  window.deleteRequest = deleteRequest;

  window.setChannel = function (channel) {
    state.formData.channel = channel;
    render();
  };

  window.goToPage = function (page) {
    state.currentPage = page;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.toggleCard = function (id) {
    state.expandedCards[id] = !state.expandedCards[id];
    render();
  };

  window.openBottomSheet = function (id) {
    state.bottomSheet = id;
    render();
  };

  window.closeBottomSheet = function () {
    state.bottomSheet = null;
    render();
  };

  window.toggleDarkMode = function () {
    state.darkMode = !state.darkMode;
    try { localStorage.setItem('darkMode', state.darkMode ? '1' : '0'); } catch (e) { }
    render();
  };

  window.setStatusFilter = function (val) {
    state.statusFilter = val;
    state.currentPage = 1;
    render();
  };

  // ==================== AI INPUT FUNCTIONS ====================

  window.setSmartPasteTab = function (tab) {
    state.smartPasteTab = tab;
    if (tab !== 'voice' && voiceRecognition) {
      voiceRecognition.stop();
      voiceRecognition = null;
      state.voiceRecording = false;
    }
    render();
  };

  window.processAiImage = async function () {
    if (!state.aiImageBase64) { alert('กรุณาเลือกรูปภาพก่อน'); return; }
    state.aiAnalyzing = true;
    render();
    try {
      const result = await googleScriptRun('analyzeImageWithAI', state.aiImageBase64);
      if (result.success) {
        applyAiResult(result.data);
      } else {
        alert('AI วิเคราะห์ไม่สำเร็จ: ' + result.error);
      }
    } catch (e) {
      alert('เกิดข้อผิดพลาด: ' + e.message);
    }
    state.aiAnalyzing = false;
    render();
  };

  window.processAiVoice = async function () {
    if (!state.voiceTranscript) { alert('กรุณาพูดก่อน'); return; }
    state.aiAnalyzing = true;
    render();
    try {
      const result = await googleScriptRun('analyzeTextWithAI', state.voiceTranscript);
      if (result.success) {
        applyAiResult(result.data);
      } else {
        alert('AI วิเคราะห์ไม่สำเร็จ: ' + result.error);
      }
    } catch (e) {
      alert('เกิดข้อผิดพลาด: ' + e.message);
    }
    state.aiAnalyzing = false;
    render();
  };

  window.toggleVoiceRecording = function () {
    if (state.voiceRecording) {
      if (voiceRecognition) voiceRecognition.stop();
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('บราวเซอร์นี้ไม่รองรับการรับเสียง กรุณาใช้ Chrome'); return; }
    state.voiceTranscript = '';
    voiceRecognition = new SR();
    voiceRecognition.lang = 'th-TH';
    voiceRecognition.continuous = true;
    voiceRecognition.interimResults = true;
    voiceRecognition.onresult = function (e) {
      var t = '';
      for (var i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
      state.voiceTranscript = t;
      render();
    };
    voiceRecognition.onend = function () { state.voiceRecording = false; voiceRecognition = null; render(); };
    voiceRecognition.onerror = function () { state.voiceRecording = false; voiceRecognition = null; render(); };
    voiceRecognition.start();
    state.voiceRecording = true;
    render();
  };

  function applyAiResult(data) {
    const fields = ['customerName', 'phone', 'address', 'serviceType', 'priority', 'description'];
    fields.forEach(function (key) {
      if (data[key]) state.formData[key] = data[key];
    });
    render();
  }

  // ==================== AI SECTION RENDERER ====================
  function renderAiSection() {
    var T = getTheme();
    var tab = state.smartPasteTab;

    function tabStyle(name) {
      var active = (tab === name);
      return 'flex:1; padding:6px; border-radius:8px; font-size:12px; font-weight:500; cursor:pointer;'
        + ' border:1px solid ' + (active ? '#16a34a' : '#4ade80') + ';'
        + ' background:' + (active ? '#16a34a' : 'transparent') + ';'
        + ' color:' + (active ? 'white' : '#4ade80') + ';';
    }

    var tabContent = '';

    if (tab === 'text') {
      tabContent =
        '<textarea id="smartPasteInput" rows="2"'
        + ' style="resize:none; font-size:12px; width:100%; padding:8px;'
        + ' border:1px solid #4ade80; border-radius:8px;'
        + ' background:' + T.inputBg + '; color:' + T.textPrimary + ';"'
        + ' placeholder="วางข้อความบรีฟ เช่น: คุณสมชาย 0812345678 ล้างแอร์ 2 เครื่อง ด่วน"></textarea>'
        + '<button type="button" onclick="window.processSmartPaste()"'
        + ' style="margin-top:8px; width:100%; padding:8px; background:#16a34a; color:white; border-radius:8px; font-weight:500;">'
        + '⚡ ประมวลผลและเติมข้อมูล</button>';

    } else if (tab === 'image') {
      var imgPreview = state.aiImageBase64
        ? '<img src="' + escapeAttr(state.aiImageBase64) + '"'
        + ' style="margin-top:8px; max-width:100%; max-height:150px; border-radius:8px;'
        + ' border:1px solid #4ade80; display:block; object-fit:contain;">'
        : '';
      var btnBg = state.aiAnalyzing ? '#86efac' : (state.aiImageBase64 ? '#16a34a' : '#166534');
      var btnCursor = (state.aiAnalyzing || !state.aiImageBase64) ? 'not-allowed' : 'pointer';
      var btnDisabled = (!state.aiImageBase64 || state.aiAnalyzing) ? ' disabled' : '';
      var btnLabel = state.aiAnalyzing ? '⏳ กำลังวิเคราะห์...' : '🤖 AI วิเคราะห์รูป';
      tabContent =
        '<input type="file" id="aiImageInput" accept="image/*"'
        + ' style="width:100%; padding:8px; border:1px dashed #4ade80; border-radius:8px;'
        + ' background:' + T.inputBg + '; font-size:12px; cursor:pointer; color:' + T.textPrimary + ';">'
        + imgPreview
        + '<button type="button" onclick="window.processAiImage()"' + btnDisabled
        + ' style="margin-top:8px; width:100%; padding:8px; border-radius:8px; font-weight:500; color:white;'
        + ' background:' + btnBg + '; cursor:' + btnCursor + ';">'
        + btnLabel + '</button>';

    } else if (tab === 'voice') {
      var recBg = state.voiceRecording ? '#7f1d1d' : 'transparent';
      var recColor = state.voiceRecording ? '#fca5a5' : '#4ade80';
      var recBorder = state.voiceRecording ? '#dc2626' : '#4ade80';
      var recLabel = state.voiceRecording ? '⏹️ หยุดฟัง' : '🎤 กดเพื่อพูด';
      var voiceBody = '';
      if (state.voiceTranscript) {
        var anaBg = state.aiAnalyzing ? '#86efac' : '#16a34a';
        var anaCursor = state.aiAnalyzing ? 'not-allowed' : 'pointer';
        var anaLabel = state.aiAnalyzing ? '⏳ กำลังวิเคราะห์...' : '🤖 AI วิเคราะห์เสียง';
        voiceBody =
          '<div style="margin-top:8px; padding:8px; background:' + T.descBg + '; border:1px solid #4ade80;'
          + ' border-radius:8px; font-size:13px; color:' + T.textPrimary + '; min-height:40px; line-height:1.5;">'
          + escapeHtml(state.voiceTranscript)
          + '</div>'
          + '<button type="button" onclick="window.processAiVoice()"'
          + (state.aiAnalyzing ? ' disabled' : '')
          + ' style="margin-top:8px; width:100%; padding:8px; border-radius:8px; font-weight:500; color:white;'
          + ' background:' + anaBg + '; cursor:' + anaCursor + ';">'
          + anaLabel + '</button>';
      } else {
        voiceBody =
          '<p style="margin-top:8px; font-size:12px; color:#4ade80; text-align:center; margin-bottom:0;">'
          + (state.voiceRecording ? '🔴 กำลังฟัง...' : 'กดปุ่มแล้วพูดข้อมูลลูกค้า')
          + '</p>';
      }
      tabContent =
        '<button type="button" onclick="window.toggleVoiceRecording()"'
        + ' style="width:100%; padding:12px; border-radius:8px; font-weight:600; font-size:15px; cursor:pointer;'
        + ' background:' + recBg + '; color:' + recColor + '; border:2px solid ' + recBorder + ';">'
        + recLabel + '</button>'
        + voiceBody;
    }

    return '<div style="background:#052e16; padding:12px; border-radius:12px; border:1px solid #166534; margin-bottom:8px;">'
      + '<label style="display:block; font-size:14px; font-weight:600; color:#4ade80; margin-bottom:8px;">🤖 AI ช่วยเติมข้อมูล</label>'
      + '<div style="display:flex; gap:4px; margin-bottom:10px;">'
      + '<button type="button" onclick="window.setSmartPasteTab(\'text\')"  style="' + tabStyle('text') + '">📝 ข้อความ</button>'
      + '<button type="button" onclick="window.setSmartPasteTab(\'image\')" style="' + tabStyle('image') + '">🖼️ รูปภาพ</button>'
      + '<button type="button" onclick="window.setSmartPasteTab(\'voice\')" style="' + tabStyle('voice') + '">🎤 เสียง</button>'
      + '</div>'
      + tabContent
      + '</div>';
  }

  function formatDate(dateStr) {
    if (!dateStr) return '-'
    try {
      return new Date(dateStr).toLocaleDateString('th-TH', {
        day: 'numeric',
        month: 'short',
        hour: '2-digit',
        minute: '2-digit'
      })
    } catch (e) {
      return dateStr
    }
  }

  function attachEventListeners() {
    const searchInput = document.getElementById('searchInput')
    if (searchInput) {
      searchInput.oninput = function (e) {
        state.searchTerm = e.target.value
        state.currentPage = 1
        render()
      }
      searchInput.focus()
    }

    const statusSelect = document.getElementById('statusSelect')
    if (statusSelect) {
      statusSelect.onchange = function (e) {
        state.statusFilter = e.target.value
        state.currentPage = 1
        render()
      }
    }

    const imageInput = document.getElementById('imageInput')
    if (imageInput) {
      imageInput.onchange = handleFileUpload
    }

    const aiImageInput = document.getElementById('aiImageInput')
    if (aiImageInput) {
      aiImageInput.onchange = function (e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (ev) {
          state.aiImageBase64 = ev.target.result;
          render();
        };
        reader.readAsDataURL(file);
      };
    }

    const formFields = ['customerName', 'phone', 'address', 'serviceType', 'description', 'status', 'notes', 'appointmentDate']
    formFields.forEach(function (field) {
      const el = document.getElementById(field)
      if (el) {
        el.oninput = function (e) { state.formData[field] = e.target.value }
        el.onchange = function (e) { state.formData[field] = e.target.value }
      }
    })
  }

  // ==================== RENDER ====================
  function render() {
    console.log('Rendering app, user:', state.user ? state.user.name : 'none');
    const T = getTheme();
    const app = document.getElementById('app')
    const loadingScreen = document.getElementById('loading-screen')

    if (app && loadingScreen) {
      loadingScreen.style.display = 'none';
      app.style.display = 'block';
    } else {
      console.error('Elements not found:', { app, loadingScreen });
    }

    // Apply dark mode to body
    document.body.style.background = T.pageBg;
    document.body.style.color = T.textPrimary;

    if (!state.user) {
      app.innerHTML = renderLoginPage()
      return
    }

    let filtered = state.requests || []

    if (state.searchTerm) {
      const search = state.searchTerm.toLowerCase()
      filtered = filtered.filter(r =>
        (r.customerName || '').toLowerCase().includes(search) ||
        (r.phone || '').includes(search) ||
        (r.requestNo || '').toLowerCase().includes(search)
      )
    }

    // Aligned with STATUS_WORKFLOW.ts
    const TODO_STATUSES = ['new', 'queue', 'waiting_quote', 'checking_parts', 'send_quote', 'waiting_response'];
    if (state.statusFilter === 'todo') {
      filtered = filtered.filter(r => TODO_STATUSES.includes(r.status))
    } else if (state.statusFilter === 'done') {
      filtered = filtered.filter(r => r.status === 'completed')
    } else if (state.statusFilter !== 'all') {
      filtered = filtered.filter(r => r.status === state.statusFilter)
    }

    const ITEMS_PER_PAGE = 15;
    const totalCount = filtered.length;
    const totalPages = Math.ceil(totalCount / ITEMS_PER_PAGE) || 1;
    if (state.currentPage > totalPages) state.currentPage = 1;
    const paged = filtered.slice((state.currentPage - 1) * ITEMS_PER_PAGE, state.currentPage * ITEMS_PER_PAGE);

    const deptRequests = state.requests || []
    const stats = {
      total: deptRequests.length,
      todo: deptRequests.filter(r => TODO_STATUSES.includes(r.status)).length,
      done: deptRequests.filter(r => r.status === 'completed').length
    }

    app.innerHTML =
      renderHeader()
      + renderStats(stats)
      + renderSearch()
      + renderJobList(paged, totalCount, state.currentPage, totalPages)
      + (state.isModalOpen ? renderModal() : '')
      + (state.bottomSheet ? renderBottomSheet() : '')

    attachEventListeners()
  }

  function renderJobList(requests, totalCount, currentPage, totalPages) {
    const T = getTheme();
    if (state.isLoading) {
      return '<div style="max-width:80rem; margin:0 auto; padding:16px;">'
        + '<div style="background:' + T.cardBg + '; border-radius:16px; padding:48px; text-align:center; border:1px solid ' + T.cardBorder + ';">'
        + '<div class="loading loading-border" style="width:40px; height:40px; margin:0 auto 12px;"></div>'
        + '<p style="color:' + T.textSecond + ';">กำลังโหลดข้อมูล...</p>'

    }

    if (totalCount === 0) {
      return '<div style="max-width:80rem; margin:0 auto; padding:16px;">'
        + '<div style="background:' + T.cardBg + '; border-radius:16px; padding:48px; text-align:center; border:1px solid ' + T.cardBorder + ';">'

        + '</div></div>';
    }

    const from = (currentPage - 1) * 15 + 1;
    const to = Math.min(currentPage * 15, totalCount);

    var paginationHtml = '';
    if (totalPages > 1) {
      paginationHtml = '<div style="max-width:80rem; margin:0 auto; padding:12px 16px; display:flex; justify-content:center; align-items:center; gap:8px;">'
        + '<button onclick="window.goToPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '')
        + ' style="padding:8px 16px; border-radius:10px; font-size:14px; border:1px solid ' + T.cardBorder + '; cursor:pointer;'

        + ' style="padding:8px 16px; border-radius:10px; font-size:14px; border:1px solid ' + T.cardBorder + '; cursor:pointer;'
        + ' background:' + (currentPage === totalPages ? T.inputBg : T.cardBg) + '; color:' + (currentPage === totalPages ? T.textFaint : T.textPrimary) + ';">'
        + 'ถัดไป →</button>'
        + '</div>';
    } else {
      paginationHtml = '<div style="height:24px;"></div>';
    }

    return '<div style="max-width:80rem; margin:0 auto; padding:0 16px 4px 16px;">'
      + '<p style="font-size:12px; color:' + T.textFaint + '; margin:0;">แสดง ' + from + '–' + to + ' จาก ' + totalCount + ' งาน</p>'
      + '</div>'
      + '<div style="max-width:80rem; margin:0 auto; padding:4px 16px 0 16px; display:flex; flex-direction:column; gap:8px;">'
      + requests.map(function (r) { return renderJobCard(r); }).join('')
      + '</div>'
      + paginationHtml;
  }

  function renderJobCard(r) {
    const T = getTheme();
    const sc = STATUS_CONFIG[r.status] || STATUS_CONFIG.new
    const isExpanded = !!state.expandedCards[r.id]
    var history = []
    try { history = JSON.parse(r.history || '[]') } catch (e) { }

    const priorityHtml = r.priority === 'emergency'
      ? '<span style="padding:2px 7px;border-radius:6px;font-size:11px;background:#fee2e2;color:#b91c1c;">🔴 ฉุกเฉิน</span>'
      : r.priority === 'urgent'
        ? '<span style="padding:2px 7px;border-radius:6px;font-size:11px;background:#fef9c3;color:#a16207;">🟡 ด่วน</span>'
        : '';

    const hasDetail = r.address || r.description || r.imageUrl || r.notes || history.length > 1

    var expandedHtml = ''
    if (isExpanded) {
      var dp = '<div style="margin-top:10px;padding-top:10px;border-top:1px solid ' + T.divider + ';">'
      if (r.address) dp += '<p style="font-size:13px;color:' + T.textSecond + ';margin:0 0 6px 0;">📍 ' + escapeHtml(r.address) + '</p>'
      if (r.description) dp += '<p style="font-size:13px;color:' + T.textSecond + ';background:' + T.descBg + ';border-radius:8px;padding:8px;margin:0 0 8px 0;">' + escapeHtml(r.description) + '</p>'
      if (r.notes) dp += '<p style="font-size:12px;color:' + T.textFaint + ';margin:0 0 6px 0;">📝 ' + escapeHtml(r.notes) + '</p>'
      if (r.imageUrl) dp += '<img src="' + escapeAttr(r.imageUrl) + '" style="max-width:100%;max-height:200px;border-radius:10px;border:1px solid ' + T.cardBorder + ';display:block;margin-bottom:8px;" onerror="this.style.display=\'none\'">'
      if (history.length > 1) {
        dp += '<div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;">'
          + '<span style="font-size:11px;color:' + T.textFaint + ';">ประวัติ:</span>'
          + history.map(function (h) {
            var hc = STATUS_CONFIG[h.status] || STATUS_CONFIG.new
            return '<span style="font-size:11px;padding:2px 7px;border-radius:4px;color:white;background:' + hc.color + ';">' + hc.icon + ' ' + hc.label + '</span>'
          }).join(' › ')
          + '</div>'
      }
      dp += '</div>'
      expandedHtml = dp
    }

    var expandBtn = hasDetail
      ? '<button onclick="window.toggleCard(\'' + escapeAttr(r.id) + '\')"'
      + ' style="padding:7px 11px;border-radius:9px;font-size:12px;background:' + T.btnSecBg + ';color:' + T.btnSecText + ';border:none;cursor:pointer;margin-left:auto;">'
      + (isExpanded ? '▲ ย่อ' : '▼ ดูเพิ่ม') + '</button>'
      : '';

    return '<div style="background:' + T.cardBg + ';border-radius:14px;padding:14px;box-shadow:' + T.cardShadow + ';border:1px solid ' + T.cardBorder + ';">'

      // Row 1: requestNo + date + status
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;">'
      + '<div style="display:flex;align-items:center;gap:6px;">'
      + '<span style="font-size:11px;font-family:monospace;color:#2563eb;font-weight:600;">' + escapeHtml(r.requestNo || '') + '</span>'
      + '<span style="font-size:11px;color:' + T.textFaint + ';">' + formatDate(r.createdAt) + '</span>'
      + '</div>'
      + '<span style="padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;color:white;background:' + sc.color + ';white-space:nowrap;">'
      + sc.icon + ' ' + sc.label + '</span>'
      + '</div>'

      // Row 2: name + phone
      + '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:7px;flex-wrap:wrap;">'
      + '<span style="font-weight:700;font-size:16px;color:' + T.textPrimary + ';">' + escapeHtml(r.customerName || '') + '</span>'
      + '<span style="font-size:13px;color:' + T.textSecond + ';">📞 ' + escapeHtml(r.phone || '') + '</span>'
      + '</div>'

      // Row 3: chips
      + '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;align-items:center;">'
      + '<span style="background:' + T.chipBg + ';padding:2px 8px;border-radius:6px;font-size:12px;color:' + T.chipText + ';">' + escapeHtml(r.serviceType || '') + '</span>'
      + '<span style="font-size:12px;color:' + T.textFaint + ';">' + escapeHtml(r.channel || '') + '</span>'
      + priorityHtml
      + (r.appointmentDate ? '<span style="font-size:12px;color:#7c3aed;">📅 ' + formatDate(r.appointmentDate) + '</span>' : '')
      + '</div>'

      // Action row: ⚡ จัดการ + expand toggle
      + '<div style="display:flex;gap:6px;align-items:center;">'
      + '<button onclick="window.openBottomSheet(\'' + escapeAttr(r.id) + '\')"'
      + ' style="padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;background:#3b82f6;color:white;border:none;cursor:pointer;">'
      + '⚡ จัดการ</button>'
      + expandBtn
      + '</div>'

      + expandedHtml
      + '</div>'
  }

  function renderBottomSheet() {
    const T = getTheme();
    const r = state.requests.find(function (x) { return String(x.id) === String(state.bottomSheet); });
    if (!r) return '';

    const sc = STATUS_CONFIG[r.status] || STATUS_CONFIG.new;
    const transitions = STATUS_TRANSITIONS[r.status || 'new'] || [];

    var transitionBtns = transitions.map(function (ns) {
      var nc = STATUS_CONFIG[ns] || STATUS_CONFIG.new;
      return '<button onclick="window.updateStatus(\'' + escapeAttr(r.id) + '\',\'' + escapeAttr(ns) + '\')"'
        + ' style="width:100%; padding:14px; border-radius:12px; font-size:15px; font-weight:600;'
        + ' background:' + nc.color + '; color:white; border:none; cursor:pointer; text-align:left;">'
        + nc.icon + ' ' + nc.label
        + '</button>';
    }).join('');

    if (!transitionBtns) {
      transitionBtns = '<p style="text-align:center; color:' + T.textFaint + '; font-size:13px; padding:8px 0; margin:0;">ไม่มีการเปลี่ยนสถานะที่ทำได้</p>';
    }

    return '<div style="position:fixed; inset:0; z-index:45;">'
      // Backdrop
      + '<div onclick="window.closeBottomSheet()"'
      + ' style="position:absolute; inset:0; background:' + T.sheetOverlay + ';"></div>'
      // Panel
      + '<div style="position:absolute; bottom:0; left:0; right:0; background:' + T.sheetBg + ';'
      + ' border-radius:20px 20px 0 0; border-top:1px solid ' + T.cardBorder + ';'
      + ' max-height:85vh; overflow-y:auto;">'
      // Handle
      + '<div style="display:flex; justify-content:center; padding:12px 0 4px 0;">'
      + '<div style="width:36px; height:4px; border-radius:2px; background:' + T.textFaint + ';"></div>'
      + '</div>'
      // Header
      + '<div style="padding:12px 20px 16px 20px; border-bottom:1px solid ' + T.divider + ';">'
      + '<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;">'
      + '<span style="font-size:18px; font-weight:700; color:' + T.textPrimary + ';">' + escapeHtml(r.customerName || '') + '</span>'
      + '<button onclick="window.closeBottomSheet()" style="background:none; border:none; font-size:20px; color:' + T.textFaint + '; cursor:pointer; padding:4px;">✕</button>'
      + '</div>'
      + '<div style="display:flex; align-items:center; gap:8px;">'
      + '<span style="font-size:11px; font-family:monospace; color:#2563eb; font-weight:600;">' + escapeHtml(r.requestNo || '') + '</span>'
      + '<span style="padding:3px 9px; border-radius:6px; font-size:12px; font-weight:600; color:white; background:' + sc.color + ';">' + sc.icon + ' ' + sc.label + '</span>'
      + '</div>'
      + '</div>'
      // Transitions
      + '<div style="padding:16px 20px;">'
      + (transitions.length ? '<p style="font-size:12px; font-weight:600; color:' + T.textFaint + '; margin:0 0 10px 0; text-transform:uppercase; letter-spacing:0.5px;">เปลี่ยนสถานะเป็น</p>' : '')
      + '<div style="display:flex; flex-direction:column; gap:8px;">'
      + transitionBtns
      + '</div>'
      // Edit + Delete
      + '<div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:16px; padding-top:16px; border-top:1px solid ' + T.divider + ';">'
      + '<button onclick="window.openModalById(\'' + escapeAttr(r.id) + '\')"'
      + ' style="padding:12px; border-radius:12px; font-size:14px; font-weight:500;'
      + ' background:' + T.btnSecBg + '; color:' + T.textPrimary + '; border:none; cursor:pointer;">'
      + '✏️ แก้ไขข้อมูล</button>'
      + '<button onclick="window.deleteRequest(\'' + escapeAttr(r.id) + '\')"'
      + ' style="padding:12px; border-radius:12px; font-size:14px; font-weight:500;'
      + ' background:#fef2f2; color:#dc2626; border:none; cursor:pointer;">'
      + '🗑️ ลบงาน</button>'
      + '</div>'
      + '</div>'
      + '</div>'
      + '</div>';
  }

  // ==================== INITIALIZE ====================
  async function initApp() {
    // Restore dark mode preference
    try {
      if (localStorage.getItem('darkMode') === '1') state.darkMode = true;
    } catch (e) { }

    try {
      console.log('=== INIT APP STARTED ===');
      state.users = await googleScriptRun('getUsers')
      console.log('Users loaded:', state.users.length);
      render()
      console.log('=== INIT APP FINISHED ===');
    } catch (e) {
      console.error('Init error:', e)
      document.getElementById('app').innerHTML =
        '<div style="padding:40px; text-align:center;">'
        + '<h2 style="color:red; margin:0 0 20px 0;">❌ เกิดข้อผิดพลาดในการโหลด</h2>'
        + '<p style="margin:0 0 20px 0; color:#64748b;">' + escapeHtml(e.message) + '</p>'
        + '<button onclick="location.reload()" style="padding:10px 20px; background:#3b82f6; color:white; border:none; border-radius:5px; cursor:pointer;">🔄 รีเฟรชหน้า</button>'
        + '</div>';
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }
  }

  console.log('=== PAGE LOADED ===');
  initApp();

  setTimeout(function () {
    if (state.users.length === 0) {
      console.error('Init timeout - users not loaded after 10 seconds');
      const app = document.getElementById('app');
      const loadingScreen = document.getElementById('loading-screen');
      if (app && loadingScreen) {
        loadingScreen.style.display = 'none';
        app.style.display = 'block';
        app.innerHTML =
          '<div style="padding:40px; text-align:center; max-width:600px; margin:0 auto;">'
          + '<div style="font-size:48px; margin-bottom:20px;">⏰</div>'
          + '<h2 style="color:#dc2626; margin:0 0 20px 0;">โหลดนานเกินไป</h2>'
          + '<div style="background:#fef2f2; border:1px solid #fecaca; border-radius:12px; padding:20px; margin:20px 0; text-align:left;">'
          + '<p style="color:#1f2937; margin:0 0 12px 0; font-weight:600;">สาเหตุที่เป็นไปได้:</p>'
          + '<ul style="color:#4b5563; margin:0; padding-left:20px; line-height:1.8;">'
          + '<li>Google Apps Script มีปัญหาหรือ error</li>'
          + '<li>Internet ช้าหรือไม่เชื่อมต่อ</li>'
          + '<li>ฟังก์ชัน getUsers ล้มเหลว</li>'
          + '<li>ยังไม่ได้รัน setup ใน Google Apps Script</li>'
          + '</ul></div>'
          + '<div style="background:#eff6ff; border:1px solid #bfdbfe; border-radius:12px; padding:20px; margin:20px 0; text-align:left;">'
          + '<p style="color:#1e40af; margin:0 0 12px 0; font-weight:600;">วิธีแก้:</p>'
          + '<ol style="color:#1e3a8a; margin:0; padding-left:20px; line-height:1.8;">'
          + '<li>เปิด Console (F12) เพื่อดู error</li>'
          + '<li>ไปที่ Google Apps Script Editor</li>'
          + '<li>เลือกฟังก์ชัน <strong>setup</strong> และกด Run</li>'
          + '<li>รีเฟรชหน้าเว็บ</li>'
          + '</ol></div>'
          + '<button onclick="location.reload()" style="padding:12px 24px; background:#3b82f6; color:white; border:none; border-radius:8px; cursor:pointer; font-size:16px; font-weight:600;">🔄 รีเฟรชหน้า</button>'
          + '</div>';
      }
    }
  }, 10000);
</script>
