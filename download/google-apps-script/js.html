  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#x27;');
  }
  function escapeAttr(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#x27;')
      .replace(/</g, '&lt;')

  // ==================== GOOGLE APPS SCRIPT FUNCTIONS ====================
  function googleScriptRun(func, ...args) {
    console.log('Calling Google Script:', func, args);
    return new Promise((resolve, reject) => {
      try {
        if (!google || !google.script) {
          throw new Error('Google Apps Script not loaded');
        }
        console.log('google.script.run available, calling:', func);
        google.script.run
          .withSuccessHandler(function (result) {
            console.log('Success:', func, result);
            resolve(result);
          })
          .withFailureHandler(function (error) {
            console.error('Google Script Error:', func, error);
            reject(error);
          })
        [func](...args);
      } catch (e) {
        console.error('googleScriptRun error:', e);
        reject(e);
      }
    });
  }

  async function loadData() {

        googleScriptRun('getUsers'),
        googleScriptRun('getRequests')
      ])
      state.users = Array.isArray(users) ? users : []
      state.requests = Array.isArray(requests) ? requests : []
    } catch (error) {
      console.error('Load error:', error)
      alert('โหลดข้อมูลไม่สำเร็จ: ' + error.message)
    }

    state.isLoading = false
    render()
  }

  async function saveRequest() {
    if (!state.formData.customerName || !state.formData.phone || !state.formData.address) {
      alert('กรุณากรอกชื่อลูกค้า เบอร์โทร และที่อยู่สถานที่ให้ครบถ้วน')
      return
    }

    state.isSaving = true
    render()

    try {
      const datePart = document.getElementById('appointmentDate_date').value;
      const timePart = document.getElementById('appointmentDate_time').value;
      if (datePart && timePart) {
        state.formData.appointmentDate = datePart + 'T' + timePart;
      } else if (datePart) {
        state.formData.appointmentDate = datePart + 'T00:00';
      } else {
        state.formData.appointmentDate = '';
      }

      const data = { ...state.formData }
      let result
      if (state.editingRequest) {
        // Merge id into data so Code.gs updateRequest(request) gets request.id
        const mergedData = { ...data, id: state.editingRequest.id }
        // Optimistic: update local state immediately
        const oldRequests = [...state.requests]
        state.requests = state.requests.map(r =>
          String(r.id) === String(state.editingRequest.id) ? { ...r, ...mergedData } : r
        )
        state.isModalOpen = false
        state.editingRequest = null
        state.isSaving = false
        render()
        // Sync to GAS in background
        result = await googleScriptRun('updateRequest', mergedData)
        if (!result || !result.success) {
          state.requests = oldRequests
          render()
          alert('บันทึกไม่สำเร็จ: ' + (result ? result.error : 'Unknown error'))
        }
      } else {
        // New request: wait for GAS to generate ID
        result = await googleScriptRun('createRequest', data)
        if (result && result.success) {
          // Prepend new request from GAS response (has real ID)
          const newReq = result.data || data
          if (newReq.history && typeof newReq.history === 'string') {
            try { newReq.history = JSON.parse(newReq.history) } catch (e) { newReq.history = [] }
          }
          state.requests = [newReq, ...state.requests]
          state.isModalOpen = false
          state.editingRequest = null
        } else {
          alert('บันทึกไม่สำเร็จ: ' + (result ? result.error : 'Unknown error'))
        }
        state.isSaving = false
        render()
      }
    } catch (error) {
      console.error('Save error:', error)
      alert('บันทึกไม่สำเร็จ: ' + error.message)
      state.isSaving = false
      render()
    }
  }

  async function updateStatus(id, newStatus) {
    // Find request index
    const idx = state.requests.findIndex(r => String(r.id) === String(id))
    if (idx === -1) return
    const oldRequest = { ...state.requests[idx] }
    const byName = (state.user && state.user.name) || 'System'

    // Optimistic: update UI immediately
    let history = []
    try { history = JSON.parse(state.requests[idx].history || '[]') } catch (e) { }
    history.push({ status: newStatus, date: new Date().toISOString(), by: byName })
    state.requests[idx] = { ...state.requests[idx], status: newStatus, history: JSON.stringify(history) }
    state.bottomSheet = null
    render()

    // Sync to GAS in background (pass byName so Code.gs records real name)
    try {
      const result = await googleScriptRun('updateStatus', id, newStatus, byName)
      if (!result || !result.success) {
        state.requests[idx] = oldRequest  // revert
        render()
        alert('อัปเดตสถานะไม่สำเร็จ: ' + (result ? result.error : 'Unknown error'))
      }
    } catch (error) {
      state.requests[idx] = oldRequest  // revert
      render()
      alert('อัปเดตสถานะไม่สำเร็จ: ' + error.message)
    }
  }

  }

  function compressImage(file, maxWidth, maxHeight, quality) {
    return new Promise(function (resolve, reject) {
      const reader = new FileReader()
      reader.onload = function (e) {
        const img = new Image()
        img.onload = function () {
          let w = img.width, h = img.height
          if (w > maxWidth || h > maxHeight) {
            const ratio = Math.min(maxWidth / w, maxHeight / h)
            w = Math.round(w * ratio)
            h = Math.round(h * ratio)
          }
          const canvas = document.createElement('canvas')
          canvas.width = w
          canvas.height = h
          canvas.getContext('2d').drawImage(img, 0, 0, w, h)
          resolve(canvas.toDataURL('image/jpeg', quality))
        }
        img.onerror = reject
        img.src = e.target.result
      }
      reader.onerror = reject
      reader.readAsDataURL(file)
    })
  }

  async function handleFileUpload(event) {
    const file = event.target.files[0]
    if (!file) return

    state.uploadingImage = true
    render()

    try {
      // ย่อรูปก่อนอัปโหลด (รองรับกล้อง Infinix / Android ความละเอียดสูง)
      const base64 = await compressImage(file, 1920, 1920, 0.75)

      // timeout 60 วิ — ถ้า GAS ไม่ตอบกลับ จะแสดง error แทนการหมุนค้าง
      const uploadPromise = googleScriptRun('uploadImage', base64, file.name)
      const timeoutPromise = new Promise(function (_, reject) {
        setTimeout(function () { reject(new Error('หมดเวลา — กรุณาลองใหม่อีกครั้ง')) }, 60000)
      })
      const result = await Promise.race([uploadPromise, timeoutPromise])

      if (result && result.success) {
        state.formData.imageUrl = result.url
      } else {
        alert('อัปโหลดรูปไม่สำเร็จ: ' + (result && result.error ? result.error : 'ไม่ทราบสาเหตุ'))
      }
    } catch (error) {
      console.error('Upload error:', error)
      alert('อัปโหลดรูปไม่สำเร็จ: ' + (error && (error.message || String(error)) || 'ไม่ทราบสาเหตุ'))
    } finally {
      state.uploadingImage = false
      render()
    }
  }

  async function handlePdfUpload(event) {
    const file = event.target.files[0]
    if (!file) return

    // ตรวจสอบประเภทไฟล์
    const allowedTypes = ['application/pdf', 'application/msword',
      'application/vnd.openxmlformats-officedocument.wordprocessingml.document']
    if (!allowedTypes.includes(file.type) && !file.name.match(/\.(pdf|doc|docx)$/i)) {
      alert('รองรับเฉพาะไฟล์ PDF, DOC, DOCX เท่านั้น')
      event.target.value = ''
      return
    }

    // จำกัดขนาดไฟล์ 20MB
    if (file.size > 20 * 1024 * 1024) {
      alert('ไฟล์ใหญ่เกินไป (สูงสุด 20MB)')
      event.target.value = ''
      return
    }

    // แสดง loading
    const label = document.getElementById('pdfUploadLabel')
    if (label) label.textContent = '⏳ กำลังอัปโหลด...'

    const reader = new FileReader()
    reader.onload = async function (e) {
      try {
        const base64 = e.target.result
        const result = await googleScriptRun('uploadFile', base64, file.name)
        if (result && result.success) {
          state.formData.pdfUrl = result.url
          state.formData.pdfFileName = file.name
          render()
        } else {
          alert('อัปโหลด PDF ไม่สำเร็จ: ' + (result ? result.error : 'Unknown error'))
          if (label) label.textContent = '📎 แนบไฟล์ PDF / DOC'
        }
      } catch (error) {
        console.error('PDF upload error:', error)
        alert('อัปโหลด PDF ไม่สำเร็จ: ' + error.message)
        if (label) label.textContent = '📎 แนบไฟล์ PDF / DOC'
      }
    }
    reader.readAsDataURL(file)
  }

  // ==================== SMART PASTE ====================
  window.processSmartPaste = function () {
    const input = document.getElementById('smartPasteInput')
    if (!input || !input.value.trim()) { alert('กรุณาใส่ข้อความก่อน'); return; }
    const text = input.value.trim()

    const phoneMatch = text.match(/0[6-9]\d{8}/)
    if (phoneMatch) state.formData.phone = phoneMatch[0]

    const nameMatch = text.match(/(?:คุณ|นาย|นาง|นางสาว|ร้าน|บริษัท)?\s*([^\s\d,]+(?:\s+[^\s\d,]+)?)/u)
    if (nameMatch) state.formData.customerName = nameMatch[0].trim()

    if (/ด่วนมาก|ฉุกเฉิน|urgency|emergency/i.test(text)) state.formData.priority = 'emergency'
    else if (/ด่วน|urgent/i.test(text)) state.formData.priority = 'urgent'

    if (/ล้างแอร์|ล้าง/i.test(text)) state.formData.serviceType = 'ล้างแอร์'
    else if (/ซ่อม/i.test(text)) state.formData.serviceType = 'ซ่อม'
    else if (/ติดตั้ง/i.test(text)) state.formData.serviceType = 'ติดตั้ง'
    else if (/ตรวจ/i.test(text)) state.formData.serviceType = 'ตรวจสอบ'

    state.formData.description = text
    render()
  }

  window.toggleVoiceRecording = function () {
    if (state.voiceRecording) {
      if (voiceRecognition) voiceRecognition.stop();
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('บราวเซอร์นี้ไม่รองรับการรับเสียง กรุณาใช้ Chrome'); return; }
    state.voiceTranscript = '';
    voiceRecognition = new SR();
    voiceRecognition.lang = 'th-TH';
    voiceRecognition.continuous = true;
    voiceRecognition.interimResults = true;
    voiceRecognition.onresult = function (e) {
      var t = '';
      for (var i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
      state.voiceTranscript = t;
      render();
    };
    voiceRecognition.onend = function () { state.voiceRecording = false; voiceRecognition = null; render(); };
    voiceRecognition.onerror = function () { state.voiceRecording = false; voiceRecognition = null; render(); };
    voiceRecognition.start();
    state.voiceRecording = true;
    render();
  };

  function formatDate(dateStr) {
    if (!dateStr) return '-'
    try {
      return new Date(dateStr).toLocaleDateString('th-TH', {
        day: 'numeric',
        month: 'short',
        hour: '2-digit',
        minute: '2-digit'
      })
    } catch (e) {
      return dateStr
    }
  }

          alert('รองรับเฉพาะไฟล์ PDF เท่านั้น');
          e.target.value = '';
          return;
        }
        if (file.size > 20 * 1024 * 1024) {
          alert('ไฟล์ใหญ่เกินไป (สูงสุด 20MB)');
          e.target.value = '';
          return;
        }
        const reader = new FileReader();
        reader.onload = function (ev) {
          state.aiPdfBase64 = ev.target.result;
          state.aiPdfFileName = file.name;
          render();
        };
        reader.readAsDataURL(file);
      };
    }

    const formFields = ['customerName', 'phone', 'address', 'serviceType', 'description', 'status', 'notes', 'appointmentDate']
    formFields.forEach(function (field) {
      const el = document.getElementById(field)

      }
    })

  // ==================== RENDER ====================
  function render() {
    console.log('Rendering app, user:', state.user ? state.user.name : 'none');
    const T = getTheme();
    const app = document.getElementById('app')
    const loadingScreen = document.getElementById('loading-screen')

    if (app && loadingScreen) {
      loadingScreen.style.display = 'none';
      app.style.display = 'block';
    } else {
      console.error('Elements not found:', { app, loadingScreen });
    }

    // Apply dark mode to body
    document.body.style.background = T.pageBg;
    document.body.style.color = T.textPrimary;

    if (!state.user) {
      app.innerHTML = renderLoginPage()
      return
    }

    let filtered = state.requests || []

    if (state.searchTerm) {
      const search = state.searchTerm.toLowerCase()
      filtered = filtered.filter(r =>
        (r.customerName || '').toLowerCase().includes(search) ||
        (r.phone || '').includes(search) ||
        (r.requestNo || '').toLowerCase().includes(search)
      )
    }

    // Aligned with STATUS_WORKFLOW.ts
    const TODO_STATUSES = ['new', 'queue', 'waiting_quote', 'checking_parts', 'send_quote', 'waiting_response'];
    if (state.statusFilter === 'todo') {
      filtered = filtered.filter(r => TODO_STATUSES.includes(r.status))
    } else if (state.statusFilter === 'done') {
      filtered = filtered.filter(r => r.status === 'completed')
    } else if (state.statusFilter !== 'all') {
      filtered = filtered.filter(r => r.status === state.statusFilter)
    }

    const ITEMS_PER_PAGE = 15;
    const totalCount = filtered.length;
    const totalPages = Math.ceil(totalCount / ITEMS_PER_PAGE) || 1;
    if (state.currentPage > totalPages) state.currentPage = 1;
    const paged = filtered.slice((state.currentPage - 1) * ITEMS_PER_PAGE, state.currentPage * ITEMS_PER_PAGE);

    const deptRequests = state.requests || []
    const stats = {
      total: deptRequests.length,
      todo: deptRequests.filter(r => TODO_STATUSES.includes(r.status)).length,
      done: deptRequests.filter(r => r.status === 'completed').length
    }

    app.innerHTML =
      renderHeader()
      + renderStats(stats)
      + renderSearch()
      + renderJobList(paged, totalCount, state.currentPage, totalPages)
      + (state.isModalOpen ? renderModal() : '')
      + (state.bottomSheet ? renderBottomSheet() : '')
      + renderBookingModal()

    attachEventListeners()
  }

  function renderJobList(requests, totalCount, currentPage, totalPages) {
    const T = getTheme();
    if (state.isLoading) {
      return '<div style="max-width:80rem; margin:0 auto; padding:16px;">'
        + '<div style="background:' + T.cardBg + '; border-radius:16px; padding:48px; text-align:center; border:1px solid ' + T.cardBorder + ';">'
        + '<div class="loading loading-border" style="width:40px; height:40px; margin:0 auto 12px;"></div>'
        + '<p style="color:' + T.textSecond + ';">กำลังโหลดข้อมูล...</p>'
        + '</div></div>';
    }

    if (totalCount === 0) {
      return '<div style="max-width:80rem; margin:0 auto; padding:16px;">'
        + '<div style="background:' + T.cardBg + '; border-radius:16px; padding:48px; text-align:center; border:1px solid ' + T.cardBorder + ';">'
        + '<div style="font-size:48px; margin-bottom:12px;">📭</div>'

        + '</div></div>';

    const from = (currentPage - 1) * 15 + 1;
    const to = Math.min(currentPage * 15, totalCount);

    var paginationHtml = '';
    if (totalPages > 1) {
      paginationHtml = '<div style="max-width:80rem; margin:0 auto; padding:12px 16px; display:flex; justify-content:center; align-items:center; gap:8px;">'
        + '<button onclick="window.goToPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '')

        + '← ก่อนหน้า</button>'

      + requests.map(function (r) { return renderJobCard(r); }).join('')

    const T = getTheme();
    const sc = STATUS_CONFIG[r.status] || STATUS_CONFIG.new
    const isExpanded = !!state.expandedCards[r.id]
    var history = []

  async function initApp() {
    // Restore dark mode preference
    try {
      if (localStorage.getItem('darkMode') === '1') state.darkMode = true;
    } catch (e) { }

    try {
      console.log('=== INIT APP STARTED ===');
      state.users = await googleScriptRun('getUsers')
      console.log('Users loaded:', state.users.length);
      // Load technicians (non-blocking)
      googleScriptRun('getTechnicians').then(function (techs) {
        state.technicians = techs || [];
      }).catch(function () { state.technicians = []; });
      render()
      console.log('=== INIT APP FINISHED ===');
    } catch (e) {
      console.error('Init error:', e)
      document.getElementById('app').innerHTML =
        '<div style="padding:40px; text-align:center;">'

        + '<p style="margin:0 0 20px 0; color:#64748b;">' + escapeHtml(e.message) + '</p>'
        + '<button onclick="location.reload()" style="padding:10px 20px; background:#3b82f6; color:white; border:none; border-radius:5px; cursor:pointer;">🔄 รีเฟรชหน้า</button>'
